<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background-color: #0d1117;
          border: 1px solid #30363d;
          border-radius: 12px;
          padding: 25px;
          font-family: 'Fira Code', 'Courier New', monospace;
          color: #79c0ff;
          font-size: 18px;
          height: 150px;
          position: relative;
          overflow: hidden;
        }
        .line {
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          margin-bottom: 8px;
        }
        .line1 { animation: type 1s steps(40) 0s forwards; }
        .line2 { animation: type 1s steps(40) 1s forwards; color: #ffa657; }
        .line3 { animation: type 1s steps(40) 2s forwards; color: #aff5b4; }
        .line4 { animation: type 1s steps(40) 3s forwards; color: #ff7b72; font-weight: bold; }
        
        .cursor {
          display: inline-block;
          width: 10px;
          height: 18px;
          background-color: #58a6ff;
          animation: blink 0.75s infinite;
        }

        @keyframes type { from { width: 0 } to { width: 100% } }
        @keyframes blink { 0%, 100% { opacity: 0 } 50% { opacity: 1 } }
      </style>
      <div class="container">
        <div class="line line1">&gt; Initializing CAST-G Encoder... <span class="cursor"></span></div>
        <div class="line line2">&gt; [OK] Gumbel-Bernoulli Boundary Sensor Active.</div>
        <div class="line line3">&gt; [OK] RVQ-8 Codebook Synced (Spelling Fidelity: 100%).</div>
        <div class="line line4">&gt; TOKENIZER KILLED. Ready for Infinite-Context Reasoning.</div>
      </div>
    </div>
  </foreignObject>
</svg>
